version: '3.9'
services:
  backend:
    image: ghcr.io/gustavobragaia/urofluxometria-backend:latest
    container_name: urofluxometria-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env.production
    # ATENÇÃO: NUNCA adicionar replicas ou rodar com pm2 cluster
    # O Map de SSE é em memória e exige single-process
    networks:
      - urofluxo

networks:
  urofluxo:
